[runtime]
use_gpu = true
use_go2 = false
use_hardware = true
host_ctrl_port = tcp://127.0.0.1:5555
host_sim_port = tcp://127.0.0.1:5556
host_feedback_port = tcp://127.0.0.1:5557
hand_eye_config = configs/hand_eye.node9_mount.json
show_all_ports = false

[hardware]
# linear, roll, seg1, seg2
command_direction = -1, -1, 1, -1
motor_direction = -1, -1, 1, -1
current_yellow_ma = 1800
current_limit_ma = 2500

[pick_fsm]
enable = false
relocalize_window = 20
relocalize_timeout_s = 1.0
coarse_offset_m = -0.22, 0.0, 0.22
short_approach_m = 0.04
align_step_m = 0.005
align_step_rad = 0.0
align_timeout_s = 1.5
error_threshold_m = 0.01
uncertainty_threshold = 0.001
lift_height_m = 0.04
lift_verify_timeout_s = 1.0
max_attempts = 3
depth_min_m = 0.3
depth_max_m = 1.5
outlier_zscore = 2.5
stage_timeout_s = 3.0
search_stable_frames = 3
anchor_jump_limit_m = 0.05
dropout_soft_limit = 3
dropout_hard_limit = 8
score_pass = 1.0
score_decay_per_s = 0.2
score_reward_observation = 0.15
attempt_hard_fail_only = true
track_confidence_min = 0.5
depth_valid_ratio_min = 0.15
use_perception_mu = true
ignore_perception_in_short_approach = true
search_track_conf_min = 0.45
view_distance_m = 0.45
view_camera_z_min_m = 0.35
view_camera_z_max_m = 0.70
view_camera_x_abs_max_m = 0.15
view_camera_y_abs_max_m = 0.12
view_camera_z_target_m = 0.50
view_lateral_offsets_m = -0.05,0.0,0.05
view_height_offsets_m = 0.0,0.05,0.10
desired_camera_xy_m = 0.0, 0.0, 0.0
desired_camera_z_m = 0.10
look_xy_threshold_m = 0.010
look_xy_deadband_m = 0.008
look_gain_theta1 = 1.0
look_gain_theta2 = 1.0
look_max_step_rad = 0.02
advance_step_m = 0.003
advance_backoff_m = 0.015
look_cmd_period_s = 0.20
commit_z_max_m = 0.2
max_advance_steps = 20
align_no_improve_limit = 6

[model]
rebuild_robot = true
roll_min_deg = -90.0
roll_max_deg = 90.0
bend_deg = 36.0

[spawn]
spawn_position = 0.0,0.0,1.0
spawn_orientation_deg = 0.0,0.0,0.0
draw_debug_markers = true

[colors]
plate = #a0a0a0
housing = #151515
wedge = #383838
node0 = #707070
node1 = #707070
node2 = #707070
node3 = #707070
node4 = #707070
node5 = #707070
node6 = #707070
node7 = #707070
node8 = #707070
node9 = #707070
gripper_base = #383838
gripper_claw_left = #383838
gripper_claw_right = #383838

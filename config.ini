[runtime]
use_gpu = true
use_go2 = false
use_hardware = false
host_ctrl_port = tcp://127.0.0.1:5555
host_sim_port = tcp://127.0.0.1:5556
host_feedback_port = tcp://127.0.0.1:5557
hand_eye_config = configs/hand_eye.node9_mount.json
show_all_ports = false

[hardware]
# linear, roll, seg1, seg2
command_direction = -1, -1, 1, -1
motor_direction = -1, -1, 1, -1
current_yellow_ma = 1800
current_limit_ma = 2500

[model]
rebuild_robot = true
roll_min_deg = -90.0
roll_max_deg = 90.0
bend_deg = 36.0

[spawn]
spawn_position = 0.0,0.0,1.0
spawn_orientation_deg = 0.0,0.0,0.0
draw_debug_markers = true

[perception]
enabled = true
detector_config = addons/autonomous_pick_place_app/configs/detector.yolo.example.json
mode = camera
detector = config
target_label = sports ball
yolo_device =
publish_hz = 10.0
show_preview = true
pipeline = search_track
tracker = csrt
track_lost_frames = 15
reacquire_on_lost = true

[pick]
enabled = true
target_scale = 0.12
scale_tol = 0.01
center_tol = 0.08
linear_step_u = 2.0
linear_gain = 40.0
max_iters = 200
require_track_frames = 3
acquire_timeout_s = 30.0

[colors]
plate = #a0a0a0
housing = #151515
wedge = #383838
node0 = #707070
node1 = #707070
node2 = #707070
node3 = #707070
node4 = #707070
node5 = #707070
node6 = #707070
node7 = #707070
node8 = #707070
node9 = #707070
gripper_base = #383838
gripper_claw_left = #383838
gripper_claw_right = #383838

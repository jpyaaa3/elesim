[runtime]
use_gpu = true
use_go2 = false
use_hardware = true
host_ctrl_port = tcp://127.0.0.1:5555
host_sim_port = tcp://127.0.0.1:5556
host_feedback_port = tcp://127.0.0.1:5557
hand_eye_config = configs/hand_eye.node9_mount.json
show_all_ports = false

[hardware]
# linear, roll, seg1, seg2
command_direction = -1, -1, 1, -1
motor_direction = -1, -1, 1, -1
current_yellow_ma = 1800
current_limit_ma = 2500

[model]
rebuild_robot = true
roll_min_deg = -90.0
roll_max_deg = 90.0
bend_deg = 36.0

[spawn]
spawn_position = 0.0,0.0,1.0
spawn_orientation_deg = 0.0,0.0,0.0
draw_debug_markers = true

[perception]
enabled = true
detector_config = addons/autonomous_pick_place_app/configs/detector.yolo.example.json
mode = camera
detector = config
target_label = sports ball
yolo_device =
publish_hz = 10.0
show_preview = true
pipeline = search_track
tracker = csrt
track_lost_frames = 15
reacquire_on_lost = true
# TRACK watchdog: re-run YOLO when scale/bbox stalls (intermittent CSRT shrink)
track_scale_min = 0.05
track_scale_stale_eps = 0.002
track_redetect_stale_frames = 20
track_bbox_shrink_ratio = 0.55
track_init_bbox_padding = 1.25
track_watchdog_min_frames = 8

[pick]
enabled = true
# 2x2 grid cell (col=1, row=0) = top-right; row 0 = top
grid_cols = 2
grid_rows = 2
target_grid_col = 1
target_grid_row = 0
# align: u = right-half center (+0.5), v = image vertical center (0.0)
target_uv_u = 0.5
target_uv_v = 0.0
# approach done when mask area / full frame >= target_scale (tuned ~quadrant 64% fill)
quadrant_fill_min = 0.80
target_scale = 0.16
scale_tol = 0.02
# UV deadband: |du|,|dv| below this → center_ok (steady error ~0.10–0.11 in logs)
center_tol = 0.12
# pick centering only (visual search still uses actions.py defaults)
center_u_gain = 12.0
center_v_gain = 12.0
center_roll_max = 6.0
center_seg_max = 6.0
center_error_scale_max = 3.5
# scale_ok but UV not improving → latch approach (avoid 200-step center loop)
center_stuck_iters = 30
center_stuck_max_uv = 0.14
# after align+approach: advance gripper 9 cm along EE local -Z (IK), holding target UV
approach_extend_m = 0.09
# legacy; extend is one-shot (full approach_extend_m per solve_then_align)
approach_extend_step_m = 0.09
linear_step_u = 2.0
linear_gain = 40.0
max_iters = 200
require_track_frames = 3
acquire_timeout_s = 30.0
# center phase: force approach / fail when scale stays far below target
scale_stuck_iters = 40
scale_stuck_ratio = 0.5
# extend when center_ok AND scale_ok (or scale plateau at target); not by step count alone
approach_scale_plateau_iters = 25
approach_scale_plateau_eps = 0.004
# legacy keys (unused for extend gate; kept for scale_stuck / docs)
approach_min_scale = 0.09
approach_min_steps = 50
approach_loose_center_tol = 0.10

[colors]
plate = #a0a0a0
housing = #151515
wedge = #383838
node0 = #707070
node1 = #707070
node2 = #707070
node3 = #707070
node4 = #707070
node5 = #707070
node6 = #707070
node7 = #707070
node8 = #707070
node9 = #707070
gripper_base = #383838
gripper_claw_left = #383838
gripper_claw_right = #383838
